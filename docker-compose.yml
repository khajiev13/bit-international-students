services:
  backend:
    build: ./backend
    container_name: lab4_professor_backend
    restart: unless-stopped
    env_file:
      - .env
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      LAB4_QA_LOG_DB_PATH: /app/analytics/question_answer_log.sqlite3
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    volumes:
      - lab4_professor_scratch:/app/scratch
      - lab4_professor_analytics:/app/analytics
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: lab4_professor_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s

  caddy:
    image: caddy:2.11.2-alpine
    container_name: lab4_professor_caddy
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PUBLIC_PORT:-8081}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s

volumes:
  lab4_professor_scratch:
  lab4_professor_analytics:
  caddy_data:
  caddy_config:
